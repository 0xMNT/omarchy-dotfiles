source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    grace = 0
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(255, 255, 255, 1.0)
    font_size = 48
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M:%S')"
    color = rgba(255, 255, 255, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:5000] ~/.config/hypr/battery-status.sh
    color = rgba(255, 255, 255, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -300
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0.5)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffff"></span>
    fail_text = Wrong password
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

