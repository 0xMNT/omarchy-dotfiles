# Extra autostart processes
# exec-once = uwsm-app -- my-service
exec-once = gammastep -m wayland -o eDP-1 -O 5800

# App autostart on specific workspaces
exec-once = [workspace 1 silent] uwsm-app -- google-chrome-stable
exec-once = [workspace 2 silent] uwsm-app -- xdg-terminal-exec
exec-once = [workspace 5 silent] uwsm-app -- spotify
exec-once = [workspace 6 silent] omarchy-launch-webapp "https://teams.microsoft.com/v2/?culture=de-de&country=de"
exec-once = [workspace 7 silent] omarchy-launch-webapp "https://outlook.live.com"
exec-once = [workspace 10 silent] uwsm-app -- firefox
exec-once = [workspace 9 silent] omarchy-launch-webapp "https://chatgpt.com"
